[canon]
expected_workspace_version = "0.38.0"
install_command = "follow the install guide at https://github.com/apply-the/canon#install"
install_guidance_ref = "https://github.com/apply-the/canon#install"
release_surface = "https://github.com/apply-the/canon/releases"
version_command = "canon --version"
version_check_strategy = "prefer-semver-then-command-probe"
command_probe = "canon inspect modes --output json"
required_modes = ["requirements", "change", "review", "verification", "pr-review", "incident", "security-assessment", "system-assessment", "migration", "supply-chain-analysis"]

[notes]
summary = "Canon CLI compatibility is semver-based when the binary exposes --version and command-contract-based when it does not; missing or incompatible binaries should be recovered through the release install guide."
