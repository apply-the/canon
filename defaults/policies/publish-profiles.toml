# Default publish-profile promotion policy.
#
# Each entry maps a Canon mode to the default promotion state and
# update strategy used when publishing with the `project-memory` profile.
#
# Operators may override this file in their repository under
# `.canon/policies/publish-profiles.toml`.

contract_version = "0.1.0"

[[profiles]]
mode = "system-shaping"
default_promotion_state = "auto"
default_update_strategy = "managed-blocks"

