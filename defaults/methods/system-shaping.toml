version = 1
# Requires explicit `--system-context new|existing` when starting a run.
# Targeted planning mode with first-class same-run draft refinement.
# Candidate detection is advisory; continuation requires explicit intent.
# Post-start redirection creates successor lineage instead of in-place mutation.
mode = "system-shaping"
emphasis = "analysis-heavy"
implementation_depth = "full"
gate_profile = ["Exploration", "Architecture", "Risk", "ReleaseReadiness"]
artifacts = [
    "system-shape.md",
    "domain-model.md",
    "architecture-outline.md",
    "capability-map.md",
    "delivery-options.md",
    "risk-hotspots.md",
]