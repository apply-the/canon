name: release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Canon version to build. Defaults to the workspace version.
        required: false
        type: string
      publish:
        description: Publish assets to the GitHub Release after verification.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-release-metadata:
    name: prepare-release-metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      publish: ${{ steps.meta.outputs.publish }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        shell: bash
        run: |
          cargo_version="$(sed -n '/^\[workspace.package\]/,/^\[/{s/^version = "\(.*\)"/\1/p}' Cargo.toml | head -n1)"
          if [[ -z "$cargo_version" ]]; then
            echo "Unable to determine workspace version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            if [[ -z "$version" ]]; then
              version="$cargo_version"
            fi
            tag="${version}"
            publish="${{ inputs.publish }}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag}"
            publish="true"
          fi

          if [[ "$version" != "$cargo_version" ]]; then
            echo "Release version ${version} does not match workspace version ${cargo_version}" >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"

  build-and-package:
    name: build-and-package (${{ matrix.label }})
    needs: prepare-release-metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            packaging: unix
          - label: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            packaging: unix
          - label: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            packaging: unix
            install_linux_cross: true
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            packaging: unix
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            packaging: windows
    steps:
      - uses: actions/checkout@v4

      - if: matrix.install_linux_cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross qemu-user unzip

      - if: runner.os == 'macOS'
        name: Remove Homebrew rustup shims
        run: |
          brew uninstall --ignore-dependencies rustup 2>/dev/null || true
          brew uninstall --ignore-dependencies rustup-init 2>/dev/null || true
          rm -f "$HOME/.cargo/bin/rustup"
          hash -r

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      - if: runner.os != 'Windows'
        name: Ensure Cargo bin is on PATH
        shell: bash
        run: echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"

      - if: runner.os == 'Windows'
        name: Ensure Cargo bin is on PATH
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $env:CARGO_HOME 'bin')

      - if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --locked -p canon-cli --bin canon --release --target ${{ matrix.target }}

      - name: Package unix artifact
        if: matrix.packaging == 'unix'
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.label }}" == "linux-arm64" ]]; then
            version_output="$(qemu-aarch64 -L /usr/aarch64-linux-gnu target/${{ matrix.target }}/release/canon --version)"
          else
            version_output="$(target/${{ matrix.target }}/release/canon --version)"
          fi
          artifact_path="$(bash scripts/release/package-unix.sh --version '${{ needs.prepare-release-metadata.outputs.version }}' --target '${{ matrix.target }}' --output-dir dist)"
          printf '%s\n' "$version_output" > "${artifact_path}.version.txt"

      - name: Package windows artifact
        if: matrix.packaging == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $versionOutput = & "target/${{ matrix.target }}/release/canon.exe" --version
          $artifactPath = & ./scripts/release/package-windows.ps1 -Version '${{ needs.prepare-release-metadata.outputs.version }}' -Target '${{ matrix.target }}' -OutputDir dist
          Set-Content -Path ("{0}.version.txt" -f $artifactPath) -Value $versionOutput -Encoding utf8NoBOM -NoNewline

      - uses: actions/upload-artifact@v4
        with:
          name: packaged-${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  assemble-release:
    name: assemble-release
    needs:
      - prepare-release-metadata
      - build-and-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: packaged-*
          merge-multiple: true
          path: dist

      - name: Render release notes
        shell: bash
        run: |
          sed \
            -e "s/{{VERSION}}/${{ needs.prepare-release-metadata.outputs.version }}/g" \
            -e "s/{{TAG}}/${{ needs.prepare-release-metadata.outputs.tag }}/g" \
            .github/release-notes-template.md > dist/release-notes.md

      - name: Verify release surface and generate checksums
        shell: bash
        run: |
          bash scripts/release/verify-release-surface.sh \
            --version '${{ needs.prepare-release-metadata.outputs.version }}' \
            --dist-dir dist \
            --release-notes dist/release-notes.md \
            --write-checksums

      - name: Generate distribution metadata
        shell: bash
        run: |
          bash scripts/release/write-distribution-metadata.sh \
            --version '${{ needs.prepare-release-metadata.outputs.version }}' \
            --dist-dir dist \
            --output dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-distribution-metadata.json

      - name: Render Homebrew formula
        shell: bash
        run: |
          bash scripts/release/render-homebrew-formula.sh \
            --metadata dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-distribution-metadata.json \
            --output dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-homebrew-formula.rb

      - name: Render winget manifests
        shell: bash
        run: |
          bash scripts/release/render-winget-manifests.sh \
            --metadata dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-distribution-metadata.json \
            --output-dir dist/winget

      - name: Render Scoop manifest
        shell: bash
        run: |
          bash scripts/release/render-scoop-manifest.sh \
            --metadata dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-distribution-metadata.json \
            --output dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-scoop-manifest.json

      - name: Verify extended release surface
        shell: bash
        run: |
          bash scripts/release/verify-release-surface.sh \
            --version '${{ needs.prepare-release-metadata.outputs.version }}' \
            --dist-dir dist \
            --release-notes dist/release-notes.md \
            --distribution-metadata dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-distribution-metadata.json \
            --homebrew-formula dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-homebrew-formula.rb \
            --winget-manifest-dir dist/winget \
            --scoop-manifest dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-scoop-manifest.json

      - uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ needs.prepare-release-metadata.outputs.version }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: needs.prepare-release-metadata.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release-metadata.outputs.tag }}
          body_path: dist/release-notes.md
          files: |
            dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-macos-arm64.tar.gz
            dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-macos-x86_64.tar.gz
            dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-linux-arm64.tar.gz
            dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-linux-x86_64.tar.gz
            dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-windows-x86_64.zip
            dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-SHA256SUMS.txt
            dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-distribution-metadata.json
            dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-homebrew-formula.rb
            dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-scoop-manifest.json
            dist/winget/ApplyThe.Canon.yaml
            dist/winget/ApplyThe.Canon.locale.en-US.yaml
            dist/winget/ApplyThe.Canon.installer.yaml

  sync-homebrew-tap:
    name: sync-homebrew-tap
    needs:
      - prepare-release-metadata
      - assemble-release
    if: needs.prepare-release-metadata.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Require tap sync token
        shell: bash
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [[ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN is required to sync apply-the/homebrew-canon. Add it as a repository or organization secret available to this repo with contents:write access to apply-the/homebrew-canon and permission to push to its main branch, then rerun the release workflow." >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-bundle-${{ needs.prepare-release-metadata.outputs.version }}
          path: dist

      - uses: actions/checkout@v4
        with:
          repository: apply-the/homebrew-canon
          ref: main
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - id: sync_formula
        name: Sync Homebrew formula into tap checkout
        shell: bash
        run: |
          sync_output="$(bash scripts/release/sync-homebrew-tap.sh \
            --formula dist/canon-${{ needs.prepare-release-metadata.outputs.version }}-homebrew-formula.rb \
            --tap-root homebrew-tap)"

          printf '%s\n' "$sync_output"

          sync_status="$(printf '%s\n' "$sync_output" | sed -n 's/^STATUS=//p' | head -n 1)"
          formula_path="$(printf '%s\n' "$sync_output" | sed -n 's/^FORMULA_PATH=//p' | head -n 1)"

          echo "status=$sync_status" >> "$GITHUB_OUTPUT"
          echo "formula_path=$formula_path" >> "$GITHUB_OUTPUT"

      - name: Push Homebrew tap update
        if: steps.sync_formula.outputs.status != 'noop'
        shell: bash
        env:
          VERSION: ${{ needs.prepare-release-metadata.outputs.version }}
          FORMULA_PATH: ${{ steps.sync_formula.outputs.formula_path }}
        run: |
          cd homebrew-tap

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/canon.rb; then
            echo "Expected ${FORMULA_PATH} to change before pushing Canon ${VERSION} into apply-the/homebrew-canon, but the tap checkout is clean." >&2
            exit 1
          fi

          git add Formula/canon.rb
          git commit -m "canon ${VERSION}"
          git push origin HEAD:main
