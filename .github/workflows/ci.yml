name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deny --locked
      - run: cargo deny check licenses bans sources

  cross-platform-build:
    name: cross-platform-build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            install-linux-cross: false
          - label: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            install-linux-cross: true
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            install-linux-cross: false
          - label: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            install-linux-cross: false
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            install-linux-cross: false
    steps:
      - uses: actions/checkout@v4
      - if: matrix.install-linux-cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> "$GITHUB_ENV"
      - run: cargo build --locked -p canon-cli --bin canon --target ${{ matrix.target }}
