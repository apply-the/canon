name: release-apt

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  prepare-metadata:
    name: prepare-release-metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ steps.extract.outputs.tag }}
      publish: ${{ steps.extract.outputs.publish }}
    steps:
      - id: extract
        name: Extract release metadata
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag}"
          if [[ -z "${version:-}" ]]; then
            echo "Could not extract version from tag '${tag}'." >&2
            exit 1
          fi
          if [[ "${tag}" == *"-"* ]]; then
            echo "Prerelease tag '${tag}' detected — skip downstream publication." >&2
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  trigger-apt-publication:
    name: Trigger APT publication
    needs:
      - prepare-metadata
    if: needs.prepare-metadata.outputs.publish == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare-metadata.outputs.version }}
      TAG: ${{ needs.prepare-metadata.outputs.tag }}
    steps:
      - name: Require packages repo token
        shell: bash
        env:
          PACKAGES_REPO_TOKEN: ${{ secrets.PACKAGES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${PACKAGES_REPO_TOKEN:-}" ]]; then
            echo "PACKAGES_REPO_TOKEN is required to trigger apply-the/packages publication." >&2
            exit 1
          fi

      - name: Trigger APT publication in packages repo
        shell: bash
        env:
          PACKAGES_REPO_TOKEN: ${{ secrets.PACKAGES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          amd64_url="https://github.com/apply-the/canon/releases/download/${TAG}/canon_${VERSION}_amd64.deb"
          arm64_url="https://github.com/apply-the/canon/releases/download/${TAG}/canon_${VERSION}_arm64.deb"
          payload="$(jq -n \
            --arg package "canon" \
            --arg version "$VERSION" \
            --arg amd64_url "$amd64_url" \
            --arg arm64_url "$arm64_url" \
            '{
              event_type: "publish-deb",
              client_payload: {
                package: $package,
                version: $version,
                deb_urls: [$amd64_url, $arm64_url]
              }
            }')"
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PACKAGES_REPO_TOKEN}" \
            https://api.github.com/repos/apply-the/packages/dispatches \
            -d "$payload"
