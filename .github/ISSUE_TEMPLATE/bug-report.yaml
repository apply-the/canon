name: Bug Report
description: Report a defect in Canon's CLI, runtime, docs, release surfaces, or assistant packages
title: "[BUG] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a Canon bug.

        Use this form for reproducible defects in the CLI, runtime behavior, install flows,
        assistant package surfaces, release artifacts, or published documentation.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Summarize the failure and why it matters.
      placeholder: e.g. `canon publish <RUN_ID>` rejects a readable security-assessment packet in AwaitingApproval state.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Provide the smallest sequence that reproduces the problem.
      placeholder: |
        1. Run `canon ...`
        2. Use input file `canon-input/...`
        3. Inspect the result
        4. Observe the failure
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected Surface
      description: Which Canon surface is involved?
      options:
        - canon CLI
        - canon-engine runtime
        - governance adapter / canon-adapters
        - docs or guides
        - release or packaging
        - assistant plugin packages
        - CI or workflows
        - other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Canon Version Or Commit
      description: Use `canon --version` or provide the exact commit SHA if you are on source.
      placeholder: e.g. 0.45.0 or db615d2
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Install Method
      options:
        - GitHub release binary
        - Homebrew
        - winget
        - Scoop
        - cargo install --path
        - local source build or cargo run
        - not sure
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
        - other
    validations:
      required: true
  - type: input
    id: architecture
    attributes:
      label: Architecture
      placeholder: e.g. arm64, x86_64
  - type: textarea
    id: context
    attributes:
      label: Relevant Context
      description: Include the mode, risk, zone, commands, assistant host, or input path if they matter.
      placeholder: e.g. mode=change, risk=bounded-impact, zone=yellow, input=canon-input/change.md
  - type: textarea
    id: logs
    attributes:
      label: Relevant Output Or Logs
      description: Paste the smallest useful error output or command transcript.
      render: shell
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirm
      options:
        - label: I searched existing issues first.
          required: true
        - label: I tested against the latest release line or current `main` when practical.
        - label: I removed secrets, tokens, and private repository data from the report.
          required: true